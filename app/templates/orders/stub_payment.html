{% extends "base.html" %}

{% block title %}Тестовая оплата — Берегиня Алтая{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-6">
            <div class="card border-0 shadow-soft rounded-theme overflow-hidden">
                <div class="card-body text-center p-5">
                    <i class="bi bi-credit-card text-primary display-4 mb-3"></i>
                    <h4 class="fw-bold mb-2">Тестовая оплата (заглушка)</h4>
                    <p class="text-muted mb-1">Сумма: <strong class="text-primary">{{ payment.amount }} ₽</strong></p>
                    <p class="small text-muted mb-4">Заказ №{{ payment.order_id }}</p>
                    <form method="post">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-2">Подтвердить оплату</button>
                    </form>
                    <a href="{{ url_for('orders.order_list') }}" class="btn btn-outline-secondary w-100">Вернуться к заказам</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
