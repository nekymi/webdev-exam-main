{% extends "base.html" %}

{% block title %}{{ 'Редактирование категории' if category else 'Новая категория' }}{% endblock %}

{% block content %}
<div class="container py-4">
    <h1 class="section-heading mb-4">Редактирование категории</h1>
    <div class="card border-0 shadow-soft rounded-theme">
        <div class="card-body p-4 p-lg-5">
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Название</label>
                    <input type="text" name="name" class="form-control" value="{{ category.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Код в URL (slug)</label>
                    <input type="text" name="slug" class="form-control" value="{{ category.slug or '' }}" placeholder="naprimer-altayskiy-med">
                    <div class="form-text">Необязательно. Для импорта/совместимости и будущих ссылок; в каталоге сейчас фильтр по id категории.</div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Описание</label>
                    <textarea name="description" class="form-control" rows="3">{{ category.description or '' }}</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{{ url_for('admin.categories') }}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
